name: Daily Stock Scanner

on:
  schedule:
    # 한국 시간(KST) 기준 오전 8시, 오후 12시, 3시, 5시 (UTC 보정)
    - cron: '0 20,3,5,7 * * *' # UTC 기준으로 수정하여 한국 시간대에 더 정확히 맞춤
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # yfinance를 목록에 추가했습니다.
          # lxml은 yfinance의 데이터 파싱 성능을 높여줍니다.
          pip install pykrx pandas gspread google-auth requests finance-datareader yfinance lxml

      - name: Run scanner
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scheduler.py
